<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1000" viewBox="0 0 1000 1000">
  <title>ALAIR NOIR Icon Logo</title>
  <desc>Transparent AN monogram icon for Alair Noir GmbH.</desc>
  <defs>
    <style>
      .mark{fill:#F6F2E9;font-family:'Cormorant Garamond','Didot','Bodoni 72','Times New Roman',serif;font-weight:400;}
      .line{stroke:#D6C7B0;stroke-width:4;stroke-linecap:round;fill:none;}
      .thin{stroke:#F6F2E9;stroke-width:5;stroke-linecap:round;fill:none;}
